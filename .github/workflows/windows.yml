# Windows CI: build HD Mapping and produce a self-contained release bundle.
# The bundle contains all executables, required DLLs, the PROJ cartographic
# database, a sample GTX geoid (EGM96 15') and a BAT launcher script.
name: Build on Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake 4.0 on Windows
        run: |
          choco install cmake --version=4.0.0 -y
          refreshenv
          cmake --version
        shell: pwsh

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Create release bundle
        shell: pwsh
        run: |
          ${{github.workspace}}/windows_bundle_toolkit/create_release.ps1 `
            -BuildDir ${{github.workspace}}/build

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v4
        with:
          name: HDMapping-windows
          path: ${{github.workspace}}/build/HDMapping_windows.zip
          retention-days: 90
          # The source is already a ZIP so additional compression has no effect;
          # disabling it avoids redundant work during the upload step.
          compression-level: 0

